<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite 顧客入口</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="customer">
  <main class="customer-home">
    <section class="portal-landing">
      <div class="space-backdrop"></div>
      <div class="earth-glow"></div>
      <div class="earth-orbit"></div>

      <div class="landing-topbar">
        <p class="eyebrow" id="heroTimestamp">--</p>
        <a class="button ghost" href="/backoffice-login.html">員工 / 管理者入口</a>
      </div>

      <div class="landing-center">
        <div class="login-card">
          <p class="eyebrow">Customer Portal</p>
          <h1>QuickBite 顧客登入 / 註冊</h1>
          <p class="hero-copy">先登入或建立顧客帳號，再開始點餐與追蹤訂單狀態。</p>

          <div class="auth-tabs">
            <button id="showCustomerLoginButton" class="button ghost is-active" type="button">顧客登入</button>
            <button id="showCustomerSignupButton" class="button ghost" type="button">顧客註冊</button>
          </div>

          <form id="customerLoginForm" class="stack">
            <label class="field">
              <span>Email</span>
              <input id="customerLoginEmail" type="email" placeholder="customer@example.com" required>
            </label>
            <label class="field">
              <span>Password</span>
              <input id="customerLoginPassword" type="password" placeholder="至少 6 碼" required>
            </label>
            <button class="button primary full-width" type="submit">登入後開始點餐</button>
          </form>

          <form id="customerSignupForm" class="stack hidden">
            <label class="field">
              <span>姓名</span>
              <input id="customerSignupName" type="text" placeholder="王小明" required>
            </label>
            <label class="field">
              <span>電話</span>
              <input id="customerSignupPhone" type="tel" placeholder="0912-345-678" required>
            </label>
            <label class="field">
              <span>Email</span>
              <input id="customerSignupEmail" type="email" placeholder="customer@example.com" required>
            </label>
            <label class="field">
              <span>Password</span>
              <input id="customerSignupPassword" type="password" placeholder="至少 6 碼" required>
            </label>
            <label class="field">
              <span>確認密碼</span>
              <input id="customerSignupPasswordConfirm" type="password" placeholder="再次輸入密碼" required>
            </label>
            <button class="button primary full-width" type="submit">建立顧客帳號</button>
          </form>

          <div class="session-box hidden" id="customerSessionBox">
            <div>
              <p class="eyebrow">Signed In</p>
              <strong id="customerSessionText">--</strong>
            </div>
            <button id="customerSignOutButton" class="button secondary" type="button">登出</button>
          </div>

          <div id="statusText" class="status-box">系統啟動中，正在連接資料庫。</div>
          <div id="customerGate" class="empty-state">登入後即可解鎖菜單、購物車與目前訂單狀態追蹤。</div>
        </div>
      </div>
    </section>

    <section id="customerContent" class="shell hidden">
      <section class="layout two-column">
        <article class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Menu</p>
              <h2>菜單點餐</h2>
            </div>
          </div>

          <div class="toolbar">
            <label class="field grow">
              <span>搜尋餐點</span>
              <input id="menuSearchInput" type="search" placeholder="例如：雞腿便當、奶茶">
            </label>
            <div id="categoryFilter" class="pill-row"></div>
          </div>

          <div id="customerMenuList" class="menu-grid"></div>
        </article>

        <aside class="panel">
          <div class="section-head">
            <div>
              <p class="eyebrow">Checkout</p>
              <h2>建立訂單</h2>
            </div>
          </div>

          <form id="orderForm" class="stack">
            <label class="field">
              <span>顧客姓名</span>
              <input id="customerNameInput" type="text" placeholder="王小明" required>
            </label>
            <label class="field">
              <span>電話</span>
              <input id="customerPhoneInput" type="tel" placeholder="0912-345-678" required>
            </label>
            <label class="field">
              <span>地址</span>
              <input id="customerAddressInput" type="text" placeholder="台北市信義區..." required>
            </label>
            <label class="field">
              <span>備註</span>
              <textarea id="customerNoteInput" rows="3" placeholder="例如：少冰、不要香菜、送到櫃台"></textarea>
            </label>

            <div class="cart-box">
              <div class="section-head compact">
                <h3>購物車</h3>
                <button id="clearCartButton" class="button text" type="button">清空</button>
              </div>
              <div id="cartItems" class="cart-items"></div>
              <div class="price-row">
                <span>總計</span>
                <strong id="cartTotalPrice">NT$ 0</strong>
              </div>
            </div>

            <button class="button primary full-width" type="submit">送出訂單</button>
          </form>
        </aside>
      </section>

      <section class="panel tracker-panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Tracker</p>
            <h2>目前訂單狀態</h2>
          </div>
          <button id="refreshCustomerOrderButton" class="button ghost" type="button">更新狀態</button>
        </div>
        <div id="customerOrderStatus" class="tracker-grid hidden">
          <article class="metric-card">
            <span>訂單編號</span>
            <strong id="customerOrderCode">-</strong>
          </article>
          <article class="metric-card">
            <span>目前狀態</span>
            <strong id="customerOrderState">-</strong>
          </article>
          <article class="metric-card">
            <span>建立時間</span>
            <strong id="customerOrderCreatedAt">-</strong>
          </article>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/scripts/customer-page.js"></script>
</body>
</html>
